<h2 style='margin:0 0 10px 0; font-size:17px;'>LoRA</h2>
<p>经典低秩适配。在现有权重层上添加小型可学习矩阵（down &times; up）。<br>
<code>y = x + (x @ down @ up) &times; scale &times; multiplier</code><br>
简单高效，是大多数微调场景的默认选择。可完全烘焙到基础 DiT 中。</p>
<p><b>变体</b><br>
&bull; <b>lora</b> &mdash; 默认 16GB+ 配置。<br>
&bull; <b>lora-8gb</b> &mdash; 低显存配置（块交换 + 卸载检查点）；如果默认配置出现 OOM，请使用此变体。</p>
