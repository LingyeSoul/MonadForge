pretrained_model_name_or_path = "D:\\AIArt\\ComfyUI-aki-v2\\ComfyUI\\models\\diffusion_models\\anima-base-v1.0.safetensors"
qwen3 = "D:\\AIArt\\ComfyUI-aki-v2\\ComfyUI\\models\\clip\\qwen_3_06b_base.safetensors"
vae = "D:\\AIArt\\ComfyUI-aki-v2\\ComfyUI\\models\\vae\\qwen_image_vae.safetensors"

# Test inference defaults (used by `make test` / WebUI "Test" button)
test_prompt = "masterpiece, best quality, score_7, safe. An anime girl wearing a black tank-top and denim shorts is standing outdoors. She's holding a rectangular sign out in front of her that reads \"ANIMA\". She's looking at the viewer with a smile. The background features some trees and blue sky with clouds."
test_negative_prompt = "worst quality, low quality, score_1, score_2, score_3, blurry, jpeg artifacts, sepia"

output_dir = "output/ckpt"
output_name = "anima_lora"
save_model_as = "safetensors"
network_module = "networks.lora_anima"
network_train_unet_only = true
source_image_dir = "image_dataset"
resized_image_dir = "post_image_dataset/resized"
lora_cache_dir = "post_image_dataset/lora"
path_pattern = "*"

# Preprocess input filter. When true, scripts/tasks/preprocess.py forwards
# `--min_pixels = min_pixels` to both preprocess/resize_images.py and
# preprocess/cache_text_embeddings.py so under-sized source images never
# enter the resize / VAE / TE caches. Default 500_000 = 0.5MP — matches the
# scripts' own argparse defaults. Set drop_lowres_images = false to keep
# every image regardless of size. Override per-run without editing this file:
#   make preprocess ARGS="--min_pixels 0"        # explicit threshold (wins)
#   make preprocess ARGS="--no_drop_lowres"      # keep every image
#   make preprocess ARGS="--drop_lowres"         # force the configured threshold
drop_lowres_images = true
min_pixels = 500000
optimizer_type = "AdamW"
lr_scheduler = "constant"
timestep_sampling = "sigmoid"
sigmoid_bias = 0.0
discrete_flow_shift = 1.0
mixed_precision = "bf16"
cache_latents = true
cache_latents_to_disk = true
cache_text_encoder_outputs = true
cache_text_encoder_outputs_to_disk = true
skip_cache_check = true
vae_chunk_size = 64
vae_disable_cache = true
masked_loss = true
torch_compile = true
attn_mode = "flash"
save_precision = "bf16"
use_custom_down_autograd = true
log_every_n_steps = 2
dataloader_pin_memory = true
persistent_data_loader_workers = false
use_cmmd = false
channel_scaling_alpha = 0.5

# Preview sampling — generate sample images at checkpoint saves
[preview]
sample_every_n_epochs = 2
sample_prompts = "configs/custom/sample_prompts.txt"
sample_sampler = "euler"
sample_guidance_scale = 3.5
sample_flow_shift = 1.0
sample_image_size = [1024, 1024]
